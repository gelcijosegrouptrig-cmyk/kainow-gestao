<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; font-family: Arial; }
.sidebar { position: fixed; top: 0; left: 0; width: 256px; height: 100vh; background: #1e293b; z-index: 300; }
.main { position: fixed; top: 0; left: 256px; right: 0; bottom: 0; display: flex; flex-direction: column; overflow: hidden; }
.topbar { flex: 0 0 64px; height: 64px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 24px; }
.content { flex: 1; overflow-y: auto; padding: 20px 24px; }
</style>
</head>
<body>
<div class="sidebar">SIDEBAR</div>
<div class="main">
  <div class="topbar">TOPBAR</div>
  <div class="content">
    <div id="result"></div>
    <script>
    // Medir onde o content começa em relação à viewport
    const content = document.querySelector(".content");
    const rect = content.getBoundingClientRect();
    const sidebar = document.querySelector(".sidebar");
    const sidebarRect = sidebar.getBoundingClientRect();
    document.getElementById("result").innerHTML = `
      <h2>Layout Test</h2>
      <p>Sidebar: left=${sidebarRect.left}, width=${sidebarRect.width}, right=${sidebarRect.right}</p>
      <p>Content: left=${rect.left}, top=${rect.top}, width=${rect.width}</p>
      <p>Gap between sidebar and content: ${rect.left - sidebarRect.right}px</p>
      <p>Content overlap with sidebar: ${Math.max(0, sidebarRect.right - rect.left)}px</p>
    `;
    </script>
  </div>
</div>
</body>
</html>
